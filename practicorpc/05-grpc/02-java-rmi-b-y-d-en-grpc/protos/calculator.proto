syntax = "proto3";

package ssdd.practicarpc.grpc;

service CalculatorService {
  rpc Sum (BinaryOperationRequest) returns (BinaryOperationResponse);
  rpc Subtract (BinaryOperationRequest) returns (BinaryOperationResponse);
  rpc Divide (BinaryOperationRequest) returns (BinaryOperationResponse);
  rpc Multiply (BinaryOperationRequest) returns (BinaryOperationResponse);
}

message BinaryOperationRequest {
  int32 op1 = 1;
  int32 op2 = 2;
}

message BinaryOperationResponse {
  int32 result = 1;
}
